name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Frontend: unit tests + type-check (fast, Linux only)
  # ──────────────────────────────────────────────
  test:
    name: Test & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - run: pnpm test

      - run: pnpm exec svelte-check --tsconfig tsconfig.json

  # ──────────────────────────────────────────────
  # 2. Frontend build (Vite) — catches import/bundle errors
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - run: pnpm build:skip-tests

  # ──────────────────────────────────────────────
  # 3. Rust compile check — all three platforms
  #    Uses `cargo check` (no codegen) so it is fast.
  #    The release workflow does a full `tauri build`
  #    on tag push; this catches breakage on every push.
  # ──────────────────────────────────────────────
  rust-check:
    name: Rust check — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rust-targets: ''
          - os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            rust-targets: ''

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: cargo check (Linux / Windows)
        if: matrix.os != 'macos-latest'
        working-directory: src-tauri
        run: cargo check --locked

      - name: cargo check (macOS universal)
        if: matrix.os == 'macos-latest'
        working-directory: src-tauri
        run: |
          cargo check --locked --target aarch64-apple-darwin
          cargo check --locked --target x86_64-apple-darwin
