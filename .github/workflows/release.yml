name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Stage 1: Create the draft release via GitHub API (no build step) ────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Builds a "What's new" list from commit subjects since the previous
      # tag, so the release body reflects this release instead of staying
      # hardcoded to whatever text was last typed in by hand.
      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "^${TAG}$" | tail -n1)
          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
            PREV_TAG=""
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi
          LOG=$(git log "$RANGE" --no-merges --pretty=format:'- %s' | grep -vE '^- chore: bump version to ' || true)
          if [ -z "$LOG" ]; then
            LOG="- See commit history"
          fi
          {
            echo "log<<CHANGELOG_EOF"
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/github-script@v7
        id: create
        env:
          CHANGELOG_LOG: ${{ steps.changelog.outputs.log }}
          PREV_TAG: ${{ steps.changelog.outputs.prev_tag }}
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const prevTag = process.env.PREV_TAG;
            const lines = [
              `## Spacebar Editor ${tag} — Public Beta`,
              '',
              'Local-first AI coding assistant. Run models on your machine (Ollama, llama.cpp) or bring your own API key (Anthropic, DeepSeek). Your code never leaves your machine.',
              '',
              `### What's new in ${tag}`,
              process.env.CHANGELOG_LOG,
              '',
              '### Install',
              '',
              '| Platform | File |',
              '|----------|------|',
              '| **Linux (Arch)** | Install via [AUR](https://aur.archlinux.org/packages/spacebar-editor-bin): `yay -S spacebar-editor-bin` |',
              '| **Linux (other)** | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |',
              '| **macOS** | `.dmg` (universal — Apple Silicon + Intel) |',
              '| **Windows** | `.msi` installer |',
              '',
              '> Project data is stored in `.sidebar/` inside your workspace. API keys go in the OS keychain — never committed to disk.',
            ];
            if (prevTag) {
              lines.push('', `**Full changelog:** https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${prevTag}...${tag}`);
            }
            const body = lines.join('\n');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Spacebar Editor ${tag}`,
              body,
              draft: true,
              prerelease: tag.includes('-'),
            });
            return data.id;
          result-encoding: string

  # ── Stage 2: Build on each platform and upload artifacts ───────────────
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-targets: ''
            args: ''
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            rust-targets: ''
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri


      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            squashfs-tools

      - run: pnpm install

      - name: Run tests
        run: pnpm test

      # Use @v0 (not @v0.5 — that floating tag is unreliable).
      # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 is intentionally absent from this
      # file so tauri-action runs on its declared Node version.
      # macOS code signing + notarization — only activates when the APPLE_*
      # secrets are configured; falls back to Tauri's default ad-hoc signature
      # otherwise. Without this, the .dmg gets Gatekeeper-quarantined on
      # download and macOS reports "app is damaged" (see docs/specs/16-build.md).
      # TAURI_SIGNING_PRIVATE_KEY(_PASSWORD) sign the updater artifacts
      # (bundle.createUpdaterArtifacts in tauri.conf.json) so tauri-action
      # emits latest.json + .sig files alongside the platform installers —
      # required for tauri-plugin-updater's GitHub-hosted endpoint to work.
      - name: Build & upload artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  # ── Stage 3: Publish the draft once all platform builds succeed ─────────
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
