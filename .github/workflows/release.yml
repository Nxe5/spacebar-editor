name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & publish — ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-targets: ''
            args: ''
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            rust-targets: ''
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            squashfs-tools

      - run: pnpm install

      - name: Run tests
        run: pnpm test

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Sidebar Editor ${{ github.ref_name }}"
          releaseBody: |
            ## Sidebar Editor ${{ github.ref_name }}

            ### Install

            | Platform | File |
            |----------|------|
            | Linux | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |
            | macOS | `.dmg` (universal — Apple Silicon + Intel) |
            | Windows | `.msi` installer |

            ### CLI usage
            ```
            sidebar <file>        # open file, all panes collapsed
            sidebar <directory>   # open project folder
            ```

            > **Migration:** project data is stored in `.sidebar/` inside your workspace.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
