<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c28"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <linearGradient id="keytop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8f0"/>
      <stop offset="100%" stop-color="#c8c8d8"/>
    </linearGradient>
    <linearGradient id="keyedge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0b0c4"/>
      <stop offset="100%" stop-color="#8888a0"/>
    </linearGradient>
  </defs>

  <!-- App icon background -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg)"/>

  <!-- Key edge / depth layer (slightly larger, offset down) -->
  <rect x="144" y="368" width="736" height="320" rx="60" fill="url(#keyedge)"/>

  <!-- Key top face -->
  <rect x="144" y="336" width="736" height="320" rx="60" fill="url(#keytop)"/>

  <!-- Spacebar groove — the horizontal bar pressed into the face -->
  <rect x="264" y="556" width="496" height="48" rx="24" fill="#3a3a52"/>

  <!-- Subtle inner shadow above groove (dark sliver) -->
  <rect x="264" y="548" width="496" height="10" rx="5" fill="#2a2a3e" opacity="0.5"/>
</svg>
